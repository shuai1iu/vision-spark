<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPARK / 特效灵感库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3d;
    --accent:#c8ff00;--accent2:#ff4d6d;--accent3:#00d4ff;
    --text:#e8e8f0;--text-muted:#6b6b85;--text-dim:#3a3a52;
    --radius:4px;
    --font-display:'Syne',sans-serif;--font-mono:'Space Mono',monospace;--font-body:'Noto Sans SC',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
  .header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;gap:24px}
  .logo{font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:.08em;color:var(--accent);flex-shrink:0}
  .logo span{color:var(--text-muted);font-weight:400;font-size:12px;letter-spacing:.15em;margin-left:8px}
  .search-wrap{flex:1;max-width:400px;position:relative}
  .search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:8px 12px 8px 36px;border-radius:var(--radius);outline:none;transition:border-color .2s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px}
  .header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
  .stat-badge{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);border:1px solid var(--border);padding:4px 10px;border-radius:2px}
  .stat-badge b{color:var(--accent)}
  .btn-add{background:var(--accent);color:#000;border:none;font-family:var(--font-display);font-weight:800;font-size:12px;letter-spacing:.08em;padding:8px 16px;cursor:pointer;border-radius:var(--radius);transition:transform .15s,box-shadow .15s}
  .btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(200,255,0,.3)}
  .filter-bar{padding:12px 32px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .filter-label{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.1em;margin-right:4px}
  .tag-btn{font-family:var(--font-mono);font-size:11px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--text-muted);border-radius:2px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .tag-btn:hover{border-color:var(--text-muted);color:var(--text)}
  .tag-btn.active{border-color:var(--accent);background:rgba(200,255,0,.08);color:var(--accent)}
  .tag-btn.cat-ai.active{border-color:#c8ff00;background:rgba(200,255,0,.08);color:#c8ff00}
  .tag-btn.cat-body.active{border-color:#ff4d6d;background:rgba(255,77,109,.08);color:#ff4d6d}
  .tag-btn.cat-fx.active{border-color:#00d4ff;background:rgba(0,212,255,.08);color:#00d4ff}
  .tag-btn.cat-ar.active{border-color:#b57bff;background:rgba(181,123,255,.08);color:#b57bff}
  .tag-btn.cat-camera.active{border-color:#ff9f43;background:rgba(255,159,67,.08);color:#ff9f43}
  .tag-btn.cat-audio.active{border-color:#26de81;background:rgba(38,222,129,.08);color:#26de81}
  .tag-btn.cat-social.active{border-color:#fd9644;background:rgba(253,150,68,.08);color:#fd9644}
  .divider{width:1px;height:20px;background:var(--border);margin:0 4px}
  .diff-filter{display:flex;gap:4px;align-items:center}
  .diff-dot{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--font-mono);color:var(--text-muted);transition:all .15s}
  .diff-dot[data-d="1"]{--dc:#26de81}.diff-dot[data-d="2"]{--dc:#c8ff00}.diff-dot[data-d="3"]{--dc:#ff9f43}.diff-dot[data-d="4"]{--dc:#ff4d6d}.diff-dot[data-d="5"]{--dc:#b57bff}
  .diff-dot.active{background:var(--dc);color:#000;border-color:var(--dc)}
  .main{padding:24px 32px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative}
  .card:hover{transform:translateY(-3px);border-color:rgba(200,255,0,.3);box-shadow:0 12px 40px rgba(0,0,0,.4)}
  .card-thumb{width:100%;aspect-ratio:16/9;background:var(--surface2);position:relative;overflow:hidden}
  .card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
  .card:hover .card-thumb img{transform:scale(1.04)}
  .thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text-dim);background:linear-gradient(135deg,var(--surface2) 0%,#0f0f1a 100%)}
  .card-type-badge{position:absolute;top:8px;left:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;padding:3px 7px;border-radius:2px;text-transform:uppercase}
  .type-video{background:rgba(255,77,109,.85);color:#fff}.type-link{background:rgba(0,212,255,.85);color:#000}.type-image{background:rgba(200,255,0,.85);color:#000}
  .diff-badge{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9px;font-weight:700}
  .diff-1{background:#26de81;color:#000}.diff-2{background:#c8ff00;color:#000}.diff-3{background:#ff9f43;color:#000}.diff-4{background:#ff4d6d;color:#fff}.diff-5{background:#b57bff;color:#fff}
  .card-body{padding:12px 14px 10px}
  .card-title{font-family:var(--font-display);font-weight:600;font-size:14px;line-height:1.4;color:var(--text);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
  .card-tag{font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:2px;border:1px solid}
  .card-tag.cat-ai{border-color:rgba(200,255,0,.4);color:#c8ff00}.card-tag.cat-body{border-color:rgba(255,77,109,.4);color:#ff4d6d}
  .card-tag.cat-fx{border-color:rgba(0,212,255,.4);color:#00d4ff}.card-tag.cat-ar{border-color:rgba(181,123,255,.4);color:#b57bff}
  .card-tag.cat-camera{border-color:rgba(255,159,67,.4);color:#ff9f43}.card-tag.cat-audio{border-color:rgba(38,222,129,.4);color:#26de81}
  .card-tag.cat-social{border-color:rgba(253,150,68,.4);color:#fd9644}
  .card-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
  .card-source{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
  .vote-btn{display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:var(--font-mono);font-size:11px;padding:4px 10px;border-radius:2px;cursor:pointer;transition:all .15s}
  .vote-btn:hover,.vote-btn.voted{border-color:var(--accent);color:var(--accent);background:rgba(200,255,0,.06)}
  .has-workflow-badge{position:absolute;bottom:8px;right:8px;font-family:var(--font-mono);font-size:9px;background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.35);color:var(--accent3);padding:2px 7px;border-radius:2px}
  .empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-muted)}
  .empty-state .big{font-size:48px;margin-bottom:16px}
  .empty-state p{font-family:var(--font-mono);font-size:13px;line-height:1.8}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;backdrop-filter:blur(6px);align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:6px;width:560px;max-width:95vw;padding:28px;margin:auto}
  .modal-title{font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--accent);margin-bottom:4px}
  .modal-sub{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-bottom:24px}
  .form-group{margin-bottom:18px}
  .form-label{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .required{color:var(--accent2)}
  .form-input,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:10px 12px;border-radius:var(--radius);outline:none;transition:border-color .2s}
  .form-input:focus,.form-textarea:focus{border-color:var(--accent)}
  .form-textarea{resize:vertical;min-height:64px}
  .type-tabs{display:flex;gap:8px;margin-bottom:14px}
  .type-tab{flex:1;padding:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--font-mono);font-size:11px;cursor:pointer;border-radius:var(--radius);transition:all .15s;text-align:center}
  .type-tab.active{border-color:var(--accent3);background:rgba(0,212,255,.08);color:var(--accent3)}
  .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:border-color .2s;display:none}
  .upload-area:hover{border-color:var(--accent)}
  .upload-area.active{display:block}
  .upload-area p{font-family:var(--font-mono);font-size:12px;color:var(--text-muted)}
  .tag-select-grid{display:flex;flex-wrap:wrap;gap:6px}
  .tag-select-btn{font-family:var(--font-mono);font-size:11px;padding:4px 10px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
  .tag-select-btn:hover{border-color:var(--text-muted);color:var(--text)}
  .tag-select-btn.sel.cat-ai{border-color:#c8ff00;background:rgba(200,255,0,.12);color:#c8ff00}
  .tag-select-btn.sel.cat-body{border-color:#ff4d6d;background:rgba(255,77,109,.12);color:#ff4d6d}
  .tag-select-btn.sel.cat-fx{border-color:#00d4ff;background:rgba(0,212,255,.12);color:#00d4ff}
  .tag-select-btn.sel.cat-ar{border-color:#b57bff;background:rgba(181,123,255,.12);color:#b57bff}
  .tag-select-btn.sel.cat-camera{border-color:#ff9f43;background:rgba(255,159,67,.12);color:#ff9f43}
  .tag-select-btn.sel.cat-audio{border-color:#26de81;background:rgba(38,222,129,.12);color:#26de81}
  .tag-select-btn.sel.cat-social{border-color:#fd9644;background:rgba(253,150,68,.12);color:#fd9644}
  .diff-select{display:flex;gap:8px}
  .diff-opt{flex:1;padding:8px 4px;border:1px solid var(--border);background:transparent;cursor:pointer;border-radius:var(--radius);text-align:center;transition:all .15s}
  .diff-opt .num{font-family:var(--font-mono);font-size:16px;font-weight:700}
  .diff-opt .lbl{font-family:var(--font-body);font-size:10px;color:var(--text-muted);margin-top:2px}
  .diff-opt[data-d="1"].sel{border-color:#26de81;background:rgba(38,222,129,.1)}.diff-opt[data-d="1"].sel .num{color:#26de81}
  .diff-opt[data-d="2"].sel{border-color:#c8ff00;background:rgba(200,255,0,.1)}.diff-opt[data-d="2"].sel .num{color:#c8ff00}
  .diff-opt[data-d="3"].sel{border-color:#ff9f43;background:rgba(255,159,67,.1)}.diff-opt[data-d="3"].sel .num{color:#ff9f43}
  .diff-opt[data-d="4"].sel{border-color:#ff4d6d;background:rgba(255,77,109,.1)}.diff-opt[data-d="4"].sel .num{color:#ff4d6d}
  .diff-opt[data-d="5"].sel{border-color:#b57bff;background:rgba(181,123,255,.1)}.diff-opt[data-d="5"].sel .num{color:#b57bff}
  .modal-footer{display:flex;gap:10px;margin-top:24px}
  .btn-cancel{flex:1;padding:10px;background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:var(--font-mono);font-size:12px;cursor:pointer;border-radius:var(--radius);transition:all .15s}
  .btn-cancel:hover{border-color:var(--text-muted);color:var(--text)}
  .btn-submit{flex:2;padding:10px;background:var(--accent);border:none;color:#000;font-family:var(--font-display);font-weight:800;font-size:13px;letter-spacing:.05em;cursor:pointer;border-radius:var(--radius);transition:all .15s}
  .btn-submit:hover{box-shadow:0 4px 20px rgba(200,255,0,.35)}
  /* DETAIL */
  .detail-modal{background:var(--surface);border:1px solid var(--border);border-radius:6px;width:960px;max-width:95vw;margin:auto}
  .detail-preview{width:100%;aspect-ratio:16/9;background:var(--bg);position:relative;overflow:hidden}
  .detail-preview img{width:100%;height:100%;object-fit:contain}
  .detail-preview video{width:100%;height:100%;object-fit:contain;background:#000}
  .detail-body{padding:24px}
  .detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
  .detail-title{font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--text);flex:1;margin-right:16px}
  .detail-close{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-size:18px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:var(--radius);flex-shrink:0;transition:all .15s}
  .detail-close:hover{border-color:var(--accent2);color:var(--accent2)}
  .detail-meta{display:flex;gap:16px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
  .meta-item{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
  .detail-desc{font-size:14px;line-height:1.7;color:var(--text-muted);margin-bottom:16px}
  .detail-link{font-family:var(--font-mono);font-size:11px;color:var(--accent3);text-decoration:none;word-break:break-all;display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border:1px solid rgba(0,212,255,.3);border-radius:2px;margin-bottom:20px;transition:border-color .15s}
  .detail-link:hover{border-color:var(--accent3)}
  .detail-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:16px;margin-top:20px}
  .vote-big{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:var(--font-display);font-weight:600;font-size:14px;padding:8px 18px;border-radius:var(--radius);cursor:pointer;transition:all .2s}
  .vote-big:hover,.vote-big.voted{border-color:var(--accent);color:var(--accent);background:rgba(200,255,0,.06)}
  .diff-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-family:var(--font-mono);font-size:12px}

  /* ═══ WORKFLOW PANEL ═══ */
  .wf-section{margin-top:28px;border-top:1px solid var(--border);padding-top:24px}
  .wf-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .wf-title{font-family:var(--font-display);font-weight:800;font-size:16px;color:var(--accent3)}
  .wf-subtitle{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:3px}
  .wf-tag-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .wf-tab-btn{font-family:var(--font-mono);font-size:11px;padding:4px 12px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
  .wf-tab-btn.active{border-color:var(--accent3);background:rgba(0,212,255,.08);color:var(--accent3)}

  /* pipeline */
  .pipeline{display:flex;align-items:flex-start;overflow-x:auto;padding-bottom:12px;margin-bottom:20px;gap:0}
  .pipeline::-webkit-scrollbar{height:4px}
  .pipeline::-webkit-scrollbar-track{background:var(--bg)}
  .pipeline::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .pipe-node{flex-shrink:0;width:168px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px;position:relative;transition:border-color .2s}
  .pipe-node:hover{border-color:var(--accent3)}
  .pipe-node.bottleneck{border-color:rgba(255,77,109,.5)}
  .pipe-node.bottleneck::after{content:'⚠ 瓶颈';position:absolute;top:-11px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;background:var(--accent2);color:#fff;padding:1px 7px;border-radius:2px;white-space:nowrap}
  .pipe-arrow{flex-shrink:0;display:flex;align-items:center;padding:0 3px;margin-top:22px;color:var(--text-dim);font-size:16px}
  .pipe-step{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:.08em;margin-bottom:4px}
  .pipe-name{font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--text);margin-bottom:8px;line-height:1.3}
  .pipe-tools{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
  .pipe-tool{font-family:var(--font-mono);font-size:10px;padding:2px 6px;border-radius:2px;display:inline-block}
  .t-model{background:rgba(200,255,0,.1);color:#c8ff00;border:1px solid rgba(200,255,0,.25)}
  .t-lib{background:rgba(0,212,255,.1);color:#00d4ff;border:1px solid rgba(0,212,255,.25)}
  .t-api{background:rgba(181,123,255,.1);color:#b57bff;border:1px solid rgba(181,123,255,.25)}
  .t-hw{background:rgba(255,159,67,.1);color:#ff9f43;border:1px solid rgba(255,159,67,.25)}
  .t-cloud{background:rgba(38,222,129,.1);color:#26de81;border:1px solid rgba(38,222,129,.25)}
  .pipe-desc{font-size:11px;color:var(--text-muted);line-height:1.5}
  .pipe-time{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:6px;border-top:1px solid var(--border);padding-top:4px}

  /* mvp */
  .mvp-box{background:rgba(200,255,0,.03);border:1px solid rgba(200,255,0,.18);border-radius:4px;padding:14px 16px}
  .mvp-label{font-family:var(--font-mono);font-size:10px;color:var(--accent);letter-spacing:.1em;margin-bottom:10px}
  .mvp-steps{list-style:none}
  .mvp-steps li{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);padding:5px 0;border-bottom:1px solid rgba(200,255,0,.06);display:flex;gap:10px;align-items:flex-start;line-height:1.5}
  .mvp-steps li:last-child{border-bottom:none}
  .mvp-num{color:var(--accent);flex-shrink:0;min-width:18px}
  .mvp-time{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);flex-shrink:0;padding-top:2px}
  .mvp-time-total{font-family:var(--font-mono);font-size:11px;color:var(--accent3);margin-top:10px;padding-top:8px;border-top:1px solid rgba(0,212,255,.12)}

  /* tool legend */
  .tool-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .legend-item{font-family:var(--font-mono);font-size:10px;display:flex;align-items:center;gap:5px;color:var(--text-muted)}
  .legend-dot{width:8px;height:8px;border-radius:1px}

  @keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
  .dot-pulse{display:inline-block;animation:pulse 1.2s ease-in-out infinite;font-size:10px;color:var(--accent3)}

  body::before{content:'';position:fixed;inset:0;opacity:.025;pointer-events:none;z-index:999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:128px}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header class="header">
  <div class="logo">SPARK <span>特效灵感库</span></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="搜索标题、描述...">
  </div>
  <div class="header-actions">

// DATA LAYER
// ══════════════════════════════════════════
const TAG_CATS={'AI生成':'cat-ai','风格迁移':'cat-ai','肢体识别':'cat-body','面部识别':'cat-body','手势识别':'cat-body','背景替换':'cat-fx','粒子特效':'cat-fx','光影特效':'cat-fx','AR叠加':'cat-ar','3D追踪':'cat-ar','镜头运镜':'cat-camera','音频驱动':'cat-audio','互动玩法':'cat-social','合拍/分屏':'cat-social'};
const DIFF_LABEL=['','简单','较易','中等','复杂','极难'];
const DIFF_COLOR=['','#26de81','#c8ff00','#ff9f43','#ff4d6d','#b57bff'];

let entries=[];
let votes=JSON.parse(localStorage.getItem('spark_votes')||'[]');
let filters={tags:[],diffs:[],platforms:[],q:''};
let currentType='link',currentFileData=null,selectedDiff=3;
let _apiBase='';//相对路径，本地开发自动指向 /api/*

// 判断是否在 Vercel 部署环境（非 file:// 和非 localhost 文件形式）
const IS_HOSTED = location.protocol !== 'file:' && !(location.hostname==='localhost' && !location.pathname.endsWith('.html'));

function save(){
  // 本地 localStorage 只作 fallback
  localStorage.setItem('spark_entries',JSON.stringify(entries));
  localStorage.setItem('spark_votes',JSON.stringify(votes));
}

// ── 云端数据加载 ──────────────────────────────
async function loadFromCloud(){
  try{
    const resp=await fetch('/api/entries');
    if(!resp.ok)throw new Error('API '+resp.status);
    const data=await resp.json();
    if(Array.isArray(data)&&data.length>=0){
      entries=data;
      save();
    }
  }catch(e){
    console.warn('[SPARK] 云端加载失败，使用本地缓存:',e.message);
    entries=JSON.parse(localStorage.getItem('spark_entries')||'[]');
  }
  render();
}

function toggleFilter(btn){
  const tag=btn.dataset.tag,plat=btn.dataset.platform;
  if(tag){filters.tags=filters.tags.includes(tag)?filters.tags.filter(t=>t!==tag):[...filters.tags,tag];btn.classList.toggle('active',filters.tags.includes(tag));}
  if(plat){filters.platforms=filters.platforms.includes(plat)?filters.platforms.filter(p=>p!==plat):[...filters.platforms,plat];btn.classList.toggle('active',filters.platforms.includes(plat));}
  render();
}
function toggleDiff(dot){const d=parseInt(dot.dataset.d);filters.diffs=filters.diffs.includes(d)?filters.diffs.filter(x=>x!==d):[...filters.diffs,d];dot.classList.toggle('active',filters.diffs.includes(d));render();}
function clearAll(){filters={tags:[],diffs:[],platforms:[],q:''};document.getElementById('searchInput').value='';document.querySelectorAll('.tag-btn.active,.diff-dot.active').forEach(b=>b.classList.remove('active'));render();}
document.getElementById('searchInput').addEventListener('input',e=>{filters.q=e.target.value.toLowerCase();render();});

function getFiltered(){
  return entries.filter(e=>{
    if(filters.tags.length&&!filters.tags.some(t=>e.tags.includes(t)))return false;
    if(filters.diffs.length&&!filters.diffs.includes(e.diff))return false;
    if(filters.platforms.length&&!filters.platforms.includes(e.platform))return false;
    if(filters.q&&!e.title.toLowerCase().includes(filters.q)&&!(e.note||'').toLowerCase().includes(filters.q))return false;
    return true;
  }).sort((a,b)=>b.id-a.id);
}

function render(){
  const list=getFiltered();
  const grid=document.getElementById('grid');
  document.getElementById('countBadge').innerHTML=`共 <b>${entries.length}</b> 条`;
  if(!list.length){grid.innerHTML=`<div class="empty-state"><div class="big">✦</div><p>暂无匹配的灵感条目<br>点击右上角「存入灵感」开始建库</p></div>`;return;}
  const hasWF=tags=>tags&&tags.some(t=>WF[t]);
  grid.innerHTML=list.map(e=>{
    const voted=votes.includes(e.id);
    const th=e.type==='image'&&e.fileData?`<img src="${e.fileData}" alt="" loading="lazy">`
              :e.type==='video'&&e.fileData?`<div class="thumb-placeholder">▶</div>`
              :e.thumb?`<img src="${e.thumb}" loading="lazy" onerror="this.style.display='none'">`
              :`<div class="thumb-placeholder">${e.type==='video'?'▶':e.type==='image'?'🖼':'🔗'}</div>`;
    const tgs=e.tags.map(t=>`<span class="card-tag ${TAG_CATS[t]||''}">${t}</span>`).join('');
    return `<div class="card" onclick="openDetail(${e.id})">
      <div class="card-thumb">${th}
        <div class="card-type-badge type-${e.type}">${e.type==='link'?'链接':e.type==='image'?'截图':'视频'}</div>
        <div class="diff-badge diff-${e.diff}">${e.diff}</div>
        ${hasWF(e.tags)?'<div class="has-workflow-badge">工作流 ▸</div>':''}
      </div>
      <div class="card-body">
        <div class="card-title">${e.title}</div>
        <div class="card-tags">${tgs}</div>
        <div class="card-footer">
          <div class="card-source">${e.platform} · ${timeAgo(e.id)}</div>
          <button class="vote-btn ${voted?'voted':''}" onclick="event.stopPropagation();toggleVote(${e.id},this)">↑ <span class="vc">${e.votes||0}</span></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function timeAgo(ts){const d=Date.now()-ts;if(d<60000)return '刚刚';if(d<3600000)return Math.floor(d/60000)+'分钟前';if(d<86400000)return Math.floor(d/3600000)+'小时前';return Math.floor(d/86400000)+'天前';}

function toggleVote(id,btn){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const isVoted=votes.includes(id);
  const action=isVoted?'down':'up';
  if(isVoted){votes=votes.filter(v=>v!==id);e.votes=Math.max(0,(e.votes||1)-1);}
  else{votes.push(id);e.votes=(e.votes||0)+1;}
  btn&&btn.classList.toggle('voted',votes.includes(id));
  btn&&(btn.querySelector('.vc').textContent=e.votes);
  save();
  // 异步同步投票到云端
  fetch('/api/vote',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id,action})
  }).then(r=>r.json()).then(d=>{
    // 用服务端返回的真实票数更新本地
    if(d.votes!=null){e.votes=d.votes;btn&&(btn.querySelector('.vc').textContent=d.votes);}
  }).catch(e=>console.warn('[SPARK] 投票同步失败:',e.message));
}

// ══════════════════════════════════════════
// WORKFLOW HTML
// ══════════════════════════════════════════
function buildWF(tags){
  const wfTags=tags.filter(t=>WF[t]);
  if(!wfTags.length)return '';

  const tabsHtml=wfTags.length>1
    ?`<div class="wf-tag-tabs">${wfTags.map((t,i)=>`<button class="wf-tab-btn ${i===0?'active':''}" onclick="switchWFTab(this,'wfp-${t.replace(/[\/\s]/g,'-')}')">${WF[t].icon} ${t}</button>`).join('')}</div>`:'';

  const legendHtml=`<div class="tool-legend">
    <span class="legend-item"><span class="legend-dot" style="background:#c8ff00"></span>AI模型</span>
    <span class="legend-item"><span class="legend-dot" style="background:#00d4ff"></span>开源库/框架</span>
    <span class="legend-item"><span class="legend-dot" style="background:#b57bff"></span>第三方API</span>
    <span class="legend-item"><span class="legend-dot" style="background:#ff9f43"></span>硬件</span>
    <span class="legend-item"><span class="legend-dot" style="background:#26de81"></span>云服务</span>
  </div>`;

  const panelsHtml=wfTags.map((tag,idx)=>{
    const wf=WF[tag];
    const nodesHtml=wf.nodes.map((n,ni)=>{
      const toolsHtml=n.tools.map(t=>`<span class="pipe-tool ${t.c}">${t.l}</span>`).join('');
      return `${ni>0?'<div class="pipe-arrow">→</div>':''}
        <div class="pipe-node${n.b?' bottleneck':''}">
          <div class="pipe-step">STEP ${n.s}</div>
          <div class="pipe-name">${n.n}</div>
          <div class="pipe-tools">${toolsHtml}</div>
          <div class="pipe-desc">${n.d}</div>
          <div class="pipe-time">⏱ ${n.t}</div>
        </div>`;
    }).join('');
    const mvpHtml=wf.mvp.map((s,i)=>`<li><span class="mvp-num">${String(i+1).padStart(2,'0')}</span><span class="mvp-time">${s.t}</span><span>${s.s}</span></li>`).join('');
    return `<div class="wf-panel" id="wfp-${tag.replace(/[\/\s]/g,'-')}" style="display:${idx===0?'block':'none'}">
      ${idx===0?legendHtml:''}
      <div class="pipeline">${nodesHtml}</div>
      <div class="mvp-box">
        <div class="mvp-label">▶ 快速上手路径 — MVP 最小试验</div>
        <ul class="mvp-steps">${mvpHtml}</ul>
        <div class="mvp-time-total">⚡ 预估总耗时：${wf.eta}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="wf-section">
    <div class="wf-header">
      <div style="font-size:20px">⚙️</div>
      <div><div class="wf-title">工程实现工作流</div><div class="wf-subtitle">// Pipeline · 推荐工具栈 · 快速上手路径</div></div>
    </div>
    ${tabsHtml}${panelsHtml}
  </div>`;
}

function switchWFTab(btn,panelId){
  const sec=btn.closest('.wf-section');
  sec.querySelectorAll('.wf-tab-btn').forEach(b=>b.classList.remove('active'));
  sec.querySelectorAll('.wf-panel').forEach(p=>p.style.display='none');
  btn.classList.add('active');
  sec.querySelector('#'+panelId).style.display='block';
}

// ══════════════════════════════════════════
// DETAIL MODAL
// ══════════════════════════════════════════
function openDetail(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const voted=votes.includes(id);
  const ds=`background:${DIFF_COLOR[e.diff]}22;color:${DIFF_COLOR[e.diff]};border:1px solid ${DIFF_COLOR[e.diff]}55`;
  let prev='';
  if(e.type==='image'&&e.fileData)prev=`<img src="${e.fileData}" alt="${e.title}">`;
  else if(e.type==='video'&&e.fileData)prev=`<video controls><source src="${e.fileData}"></video>`;
  else if(e.thumb)prev=`<img src="${e.thumb}" style="object-fit:contain" onerror="this.style.display='none'">`;
  else prev=`<div style="height:160px;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text-dim)">🔗</div>`;
  const tgs=e.tags.map(t=>`<span class="card-tag ${TAG_CATS[t]||''}" style="font-size:12px;padding:4px 10px">${t}</span>`).join('');
  document.getElementById('detailModal').innerHTML=`
    <div class="detail-preview">${prev}</div>
    <div class="detail-body">
      <div class="detail-header">
        <div class="detail-title">${e.title}</div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-meta">
        <span class="meta-item">📍 ${e.platform}</span>
        <span class="meta-item">🕐 ${timeAgo(e.id)}</span>
        <span class="diff-pill" style="${ds}">落地难度 ${e.diff} — ${DIFF_LABEL[e.diff]}</span>
      </div>
      ${tgs?`<div class="card-tags" style="margin-bottom:14px">${tgs}</div>`:''}
      ${e.note?`<div class="detail-desc">${e.note}</div>`:''}
      ${e.url?`<a class="detail-link" href="${e.url}" target="_blank">↗ ${e.url}</a>`:''}
      ${buildWF(e.tags)}
      <div class="detail-footer">
        <button class="vote-big ${voted?'voted':''}" id="dvb" onclick="handleDetailVote(${id})">↑ 投票支持 &nbsp;<span class="vc">${e.votes||0}</span></button>
        ${e.url?`<a href="${e.url}" target="_blank" class="detail-link" style="margin-bottom:0">原始链接 ↗</a>`:''}
      </div>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}
function handleDetailVote(id){
  toggleVote(id,null);
  const e=entries.find(x=>x.id===id),btn=document.getElementById('dvb');
  if(btn&&e){btn.classList.toggle('voted',votes.includes(id));btn.querySelector('.vc').textContent=e.votes;}
  render();
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');}
document.getElementById('detailOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('detailOverlay'))closeDetail();});

function openAddModal(){resetForm();document.getElementById('addOverlay').classList.add('open');}
function closeAddModal(){document.getElementById('addOverlay').classList.remove('open');}
document.getElementById('addOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('addOverlay'))closeAddModal();});
function switchType(t){currentType=t;currentFileData=null;document.querySelectorAll('.type-tab').forEach(b=>b.classList.toggle('active',b.dataset.type===t));document.getElementById('urlGroup').style.display=t==='link'?'':'none';document.getElementById('uploadArea').classList.toggle('active',t!=='link');document.getElementById('uploadArea').querySelector('p').textContent='📁 点击选择文件';}
function triggerUpload(){document.getElementById('fileInput').click();}
function handleFile(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{currentFileData={dataUrl:ev.target.result,mimeType:f.type};document.getElementById('uploadArea').querySelector('p').textContent='✓ '+f.name;if(!document.getElementById('titleInput').value)document.getElementById('titleInput').value=f.name.replace(/\.[^.]+$/,'');};r.readAsDataURL(f);}
function toggleTag(btn){btn.classList.toggle('sel');}
function selectDiff(el){document.querySelectorAll('.diff-opt').forEach(d=>d.classList.remove('sel'));el.classList.add('sel');selectedDiff=parseInt(el.dataset.d);}

// ── AI ANALYZE ───────────────────────────
async function analyzeUrl(){
  const url=document.getElementById('urlInput').value.trim();
  if(!url){shake(document.getElementById('urlInput'));return;}
  try{new URL(url);}catch(e){shake(document.getElementById('urlInput'));return;}

  const btn=document.getElementById('analyzeBtn');
  btn.disabled=true;btn.textContent='分析中...';btn.style.opacity='.5';

  const panel=document.getElementById('aiResultPanel');
  const statusText=document.getElementById('aiStatusText');
  const editHint=document.getElementById('aiEditHint');
  const resultBody=document.getElementById('aiResultBody');
  panel.style.display='block';
  statusText.textContent='✦ AI 正在分析...';
  editHint.style.display='none';
  resultBody.innerHTML=`<div style="display:flex;gap:6px;align-items:center;color:var(--text-muted);font-family:var(--font-mono);font-size:12px">
    <span class="dot-pulse">●</span><span class="dot-pulse" style="animation-delay:.2s">●</span><span class="dot-pulse" style="animation-delay:.4s">●</span>
    <span style="margin-left:4px">正在读取 ${url.replace(/https?:\/\//,'')} ...</span>
  </div>`;

  const ALL_TAGS=['AI生成','风格迁移','肢体识别','面部识别','手势识别','背景替换','粒子特效','光影特效','AR叠加','3D追踪','镜头运镜','音频驱动','互动玩法','合拍/分屏'];

  const prompt=`你是一名专业的短视频特效产品经理，专门分析海外视觉特效产品。

我需要你分析这个URL对应的产品/功能：${url}

请根据URL的域名、路径和你对这个产品的了解，判断它是什么特效或视觉玩法，然后严格按照以下JSON格式输出，不要输出任何其他内容：

{
  "title": "用15字以内的中文描述这个特效玩法的核心功能，要具体有料",
  "note": "用2-3句话描述这个玩法的亮点、用户体验特点、以及对我们团队的参考价值",
  "platform": "从以下选项中选一个最匹配的：TikTok/Instagram/YouTube/Snapchat/BeReal/其他",
  "tags": ["从以下列表中选1-3个最匹配的技术标签：${ALL_TAGS.join('/')}"],
  "difficulty": 一个1-5的整数（1=简单/纯前端可做，2=较易/需少量模型，3=中等/需多模型协作，4=复杂/需实时推理优化，5=极难/业界顶尖才能做好）,
  "difficultyReason": "用一句话解释难度评分的原因，要具体说明技术瓶颈在哪"
}

注意：
- title要让人一眼知道这是什么特效，避免模糊词如"功能"、"工具"
- tags只选真正涉及的技术，不要凑数
- difficulty要客观，参考实现这个特效需要的模型复杂度和实时性要求`;

  try{
    // 调用后端代理 /api/analyze，避免在前端暴露 GEMINI_API_KEY
    const resp=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.error||'AI分析失败');
    const result=data;

    // Apply results to form
    document.getElementById('titleInput').value=result.title||'';
    document.getElementById('titleAiBadge').style.display='inline';
    document.getElementById('noteInput').value=result.note||'';
    document.getElementById('noteAiBadge').style.display='inline';

    // Set platform
    const platSel=document.getElementById('platformInput');
    const platOpts=['TikTok','Instagram','YouTube','Snapchat','BeReal','其他'];
    const matchedPlat=platOpts.find(p=>result.platform&&result.platform.includes(p))||'其他';
    platSel.value=matchedPlat;

    // Set tags
    document.querySelectorAll('#tagSelectGrid .tag-select-btn').forEach(b=>b.classList.remove('sel'));
    (result.tags||[]).forEach(t=>{
      const btn=document.querySelector(`#tagSelectGrid .tag-select-btn[data-t="${t}"]`);
      if(btn)btn.classList.add('sel');
    });
    document.getElementById('tagAiBadge').style.display='inline';

    // Set difficulty
    const d=Math.min(5,Math.max(1,parseInt(result.difficulty)||3));
    document.querySelectorAll('.diff-opt').forEach(el=>el.classList.toggle('sel',parseInt(el.dataset.d)===d));
    selectedDiff=d;
    document.getElementById('diffAiBadge').style.display='inline';
    if(result.difficultyReason){
      const dr=document.getElementById('diffReason');
      dr.textContent='💡 '+result.difficultyReason;
      dr.style.display='block';
    }

    // Show success in panel
    const tagNames=(result.tags||[]).join(' · ');
    resultBody.innerHTML=`<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);line-height:1.8">
      <div style="color:var(--accent);margin-bottom:6px">✓ 分析完成 — 所有字段已自动填写，可直接存入或修改</div>
      <div>标题：<span style="color:var(--text)">${result.title}</span></div>
      <div>标签：<span style="color:var(--accent3)">${tagNames||'无'}</span></div>
      <div>难度：<span style="color:${DIFF_COLOR[d]}">${d} — ${DIFF_LABEL[d]}</span></div>
    </div>`;
    statusText.textContent='✦ AI 分析完成';
    editHint.style.display='block';

  }catch(err){
    resultBody.innerHTML=`<div style="font-family:var(--font-mono);font-size:11px;color:var(--accent2)">⚠ ${err.message||'分析失败，请检查网络后重试'}</div>`;
    statusText.textContent='✦ 分析遇到问题';
  }finally{
    btn.disabled=false;btn.textContent='✦ 重新分析';btn.style.opacity='1';
  }
}

async function submitEntry(){
  const title=document.getElementById('titleInput').value.trim();
  const url=document.getElementById('urlInput').value.trim();
  const note=document.getElementById('noteInput').value.trim();
  const platform=document.getElementById('platformInput').value;
  if(!title){shake(document.getElementById('titleInput'));return;}
  if(currentType==='link'&&!url){shake(document.getElementById('urlInput'));return;}
  if(currentType!=='link'&&!currentFileData){shake(document.getElementById('uploadArea'));return;}
  const tags=[...document.querySelectorAll('#tagSelectGrid .tag-select-btn.sel')].map(b=>b.dataset.t);
  let thumb='';if(currentType==='link'){try{const u=new URL(url);thumb=`https://www.google.com/s2/favicons?sz=128&domain=${u.hostname}`;}catch(e){}}

  // 生成 UUID 作为主键（Supabase uuid 类型）
  const id=crypto.randomUUID();
  // fileData（base64）只存本地，不上传服务器（体积过大）
  const fileDataLocal=currentFileData?currentFileData.dataUrl:null;
  const newEntry={id,type:currentType,title,url:currentType==='link'?url:'',fileData:fileDataLocal,note,platform,tags,diff:selectedDiff,votes:0,thumb};

  // 先乐观更新 UI
  entries.unshift(newEntry);
  save();closeAddModal();render();

  // 异步同步到云端（不阻塞用户操作）
  try{
    const resp=await fetch('/api/entries',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...newEntry,fileData:null})// 不发 base64
    });
    if(!resp.ok){const err=await resp.json();console.warn('[SPARK] 同步失败:',err.error);}
  }catch(e){
    console.warn('[SPARK] 网络错误，已保存到本地:',e.message);
  }
}
function shake(el){el.style.borderColor='var(--accent2)';setTimeout(()=>el.style.borderColor='',1000);}
function resetForm(){
  currentType='link';currentFileData=null;selectedDiff=3;
  document.getElementById('urlInput').value='';
  document.getElementById('titleInput').value='';
  document.getElementById('noteInput').value='';
  document.getElementById('platformInput').value='TikTok';
  document.getElementById('aiResultPanel').style.display='none';
  document.getElementById('analyzeBtn').textContent='✦ AI 分析';
  document.getElementById('analyzeBtn').disabled=false;
  document.getElementById('analyzeBtn').style.opacity='1';
  ['titleAiBadge','noteAiBadge','tagAiBadge','diffAiBadge'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('diffReason').style.display='none';
  document.querySelectorAll('.type-tab').forEach(b=>b.classList.toggle('active',b.dataset.type==='link'));
  document.getElementById('urlGroup').style.display='';
  document.getElementById('uploadArea').classList.remove('active');
  document.getElementById('fileInput').value='';
  document.getElementById('uploadArea').querySelector('p').textContent='📁 点击选择文件';
  document.querySelectorAll('#tagSelectGrid .tag-select-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.diff-opt').forEach(d=>d.classList.toggle('sel',d.dataset.d==='3'));
}

  [{type:'link',title:'TikTok 面部融合特效 — 双人脸实时合并',url:'https://www.tiktok.com',platform:'TikTok',tags:['面部识别','AI生成'],diff:4,note:'用户同框时触发，融合过渡丝滑，适合合拍场景改版。',votes:12},

   {type:'link',title:'Snapchat AR 换装 — 实时服饰替换',url:'https://www.snapchat.com',platform:'Snapchat',tags:['背景替换','AR叠加','肢体识别'],diff:5,note:'3D Cloth simulation + 全身识别，接近商用试穿间。',votes:21},

   {type:'link',title:'YouTube — 音波可视化歌词墙',url:'https://www.youtube.com',platform:'YouTube',tags:['音频驱动','互动玩法'],diff:3,note:'歌词随节拍弹出消散，字体粗细随振幅变化。',votes:16},
   {type:'link',title:'分屏合拍 — 镜像运动同步挑战',url:'https://www.tiktok.com',platform:'TikTok',tags:['合拍/分屏','肢体识别'],diff:2,note:'实时检测骨骼关键点，动作偏差高亮提示。',votes:19},

// 优先从云端加载；若在本地静态打开则 fallback 到 localStorage + seed
if(location.protocol==='file:'){
  // 直接打开 HTML 文件时，API 不可用，用本地数据
  entries=JSON.parse(localStorage.getItem('spark_entries')||'[]');
  seedIfEmpty();render();
}else{
  // 部署到服务器时，从云端加载数据
  loadFromCloud().then(()=>{ if(!entries.length){seedIfEmpty();render();} });
